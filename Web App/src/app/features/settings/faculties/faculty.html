<p-toast></p-toast>
<div class="card">
    <!-- Header -->
    <div class="flex items-center justify-between mb-4">
        <h1 class="text-2xl font-semibold text-surface-900 dark:text-surface-0 m-0">Faculties</h1>
        <p-button 
            *ngIf="canManage"
            label="New Faculty" 
            icon="pi pi-plus" 
            size="small"
            (onClick)="show()"
        />
    </div>

    <!-- Search -->
    <div class="mb-4">
        <p-iconfield>
            <p-inputicon class="pi pi-search" />
            <input 
                pInputText 
                type="text" 
                placeholder="Search faculties..." 
                class="w-full"
                (input)="onSearch($event)"
            />
        </p-iconfield>
        <p class="text-xs text-surface-500 mt-2 mb-0">
            {{ filteredFaculties().length }} of {{ faculties().length }} faculties
        </p>
    </div>

    <!-- Table -->
    <p-table 
        [value]="filteredFaculties()" 
        [tableStyle]="{ 'min-width': '30rem' }"
        styleClass="p-datatable-sm"
        [rowHover]="true"
    >
        <ng-template pTemplate="header">
            <tr>
                <th style="width: 20%">Code</th>
                <th>Name</th>
                <th class="text-center" style="width: 8rem">Actions</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-faculty>
            <tr>
                <td class="font-mono text-sm">{{ faculty.code }}</td>
                <td>{{ faculty.name }}</td>
                <td class="text-center">
                    <p-button icon="pi pi-eye" [text]="true" [rounded]="true" size="small" (onClick)="viewDetails(faculty)" />
                    <p-button icon="pi pi-pencil" [text]="true" [rounded]="true" size="small" *ngIf="canManage" (onClick)="editFaculty(faculty)" />
                    <p-button icon="pi pi-trash" [text]="true" [rounded]="true" severity="danger" size="small" *ngIf="canManage" (onClick)="deleteFaculty(faculty)" />
                </td>
            </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
            <tr>
                <td colspan="3" class="text-center py-8">
                    <p class="text-surface-500 m-0">No faculties found.</p>
                    <p-button *ngIf="canManage" label="Add Faculty" [link]="true" size="small" (onClick)="show()" />
                </td>
            </tr>
        </ng-template>
    </p-table>

    <!-- Add/Edit Modal -->
    <p-dialog 
        [(visible)]="visible"
        [modal]="true"
        [style]="{ width: '450px' }"
        [draggable]="false"
        [resizable]="false"
        [header]="isEditMode() ? 'Edit Faculty' : 'New Faculty'"
    >
        <div class="flex flex-col gap-4">
            <div class="flex flex-col gap-1">
                <label for="faculty-name" class="text-sm font-medium">Name *</label>
                <div class="flex items-center gap-2">
                    <span class="text-sm text-surface-500">Faculty of</span>
                    <input id="faculty-name" pInputText [(ngModel)]="faculty.name" placeholder="e.g., Engineering" class="flex-1" />
                </div>
            </div>
            <div class="flex flex-col gap-1">
                <label for="faculty-code" class="text-sm font-medium">Code *</label>
                <input id="faculty-code" pInputText [(ngModel)]="faculty.code" placeholder="e.g., ENG" style="text-transform: uppercase;" />
            </div>
        </div>

        <ng-template pTemplate="footer">
            <div class="flex justify-end gap-2">
                <p-button label="Cancel" [outlined]="true" severity="secondary" (onClick)="onCancel()" />
                <p-button [label]="isEditMode() ? 'Save' : 'Create'" (onClick)="onSubmit()" />
            </div>
        </ng-template>
    </p-dialog>

    <!-- View Details Modal -->
    <p-dialog 
        [(visible)]="viewModalVisible"
        [modal]="true"
        [style]="{ width: '400px' }"
        [draggable]="false"
        [resizable]="false"
        header="Faculty Details"
    >
        <div class="flex flex-col gap-3" *ngIf="selectedFaculty">
            <div>
                <p class="text-xs text-surface-500 mb-1">Code</p>
                <p class="m-0 font-mono text-sm">{{ selectedFaculty.code }}</p>
            </div>
            <div>
                <p class="text-xs text-surface-500 mb-1">Name</p>
                <p class="m-0 text-sm">{{ selectedFaculty.name }}</p>
            </div>
        </div>

        <ng-template pTemplate="footer">
            <div class="flex justify-end gap-2">
                <p-button *ngIf="canManage" label="Edit" icon="pi pi-pencil" [outlined]="true" size="small" (onClick)="hideViewModal(); editFaculty(selectedFaculty!)" />
                <p-button label="Close" severity="secondary" size="small" (onClick)="hideViewModal()" />
            </div>
        </ng-template>
    </p-dialog>
</div>
