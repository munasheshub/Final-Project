<div class="layout-wrapper" [class.layout-sidebar-collapsed]="!sidebarVisible">
  
  <!-- Sidebar -->
  <aside class="layout-sidebar" [class.visible]="sidebarVisible">
    <div class="sidebar-header">
      <div class="logo-container">
        <i class="pi pi-shield" style="font-size: 2rem; color: #1976D2;"></i>
        <div class="logo-text" *ngIf="sidebarVisible">
          <h3>CertChain</h3>
          <span>Academic Verification</span>
        </div>
      </div>
    </div>

    <div class="sidebar-content">
      <p-panelMenu 
        [model]="sidebarMenuItems"
        [multiple]="false"
        styleClass="sidebar-menu">
      </p-panelMenu>
    </div>

    <div class="sidebar-footer" *ngIf="currentUser && sidebarVisible">
      <p-divider></p-divider>
      <div class="user-info">
        <p-avatar 
          [label]="currentUser.firstName.charAt(0) + currentUser.lastName.charAt(0))"
          [image]="currentUser.avatarUrl"
          size="large"
          shape="circle"
          [style]="{'background-color': '#1976D2', 'color': '#ffffff'}">
        </p-avatar>
        <div class="user-details">
          <span class="user-name">{{ currentUser.firstName }} {{ currentUser.lastName }}</span>
          <span class="user-role">{{ currentUser.role.replace('_', ' ') }}</span>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main Content Area -->
  <div class="layout-main">
    
    <!-- Header -->
    <header class="layout-header">
      <div class="header-content">
        <div class="header-left">
          <p-button 
            icon="pi pi-bars"
            [text]="true"
            [rounded]="true"
            severity="secondary"
            (onClick)="toggleSidebar()"
            pTooltip="Toggle Menu"
            tooltipPosition="bottom">
          </p-button>

          <p-breadcrumb 
            [model]="[]"
            styleClass="breadcrumb-custom">
          </p-breadcrumb>
        </div>

        <div class="header-right">
          <!-- Search -->
          <span class="p-input-icon-left search-box">
            <i class="pi pi-search"></i>
            <input 
              type="text" 
              pInputText 
              placeholder="Search certificates..." 
              class="search-input" />
          </span>

          <!-- Dark Mode Toggle -->
          <p-button 
            [icon]="isDarkMode ? 'pi pi-sun' : 'pi pi-moon'"
            [text]="true"
            [rounded]="true"
            severity="secondary"
            (onClick)="toggleTheme()"
            [pTooltip]="isDarkMode ? 'Light Mode' : 'Dark Mode'"
            tooltipPosition="bottom">
          </p-button>

          <!-- Notifications -->
          <div class="notification-container">
            <p-button 
              icon="pi pi-bell"
              [text]="true"
              [rounded]="true"
              severity="secondary"
              pTooltip="Notifications"
              tooltipPosition="bottom"
              [badge]="notificationCount > 0 ? notificationCount.toString() : undefined"
              badgeSeverity="danger">
            </p-button>
          </div>

          <!-- User Menu -->
          <div class="user-menu-container">
            <p-button 
              [text]="true"
              [rounded]="true"
              severity="secondary"
              (click)="userMenu.toggle($event)">
              <p-avatar 
                [label]="currentUser ? currentUser.firstName.charAt(0) : 'U'"
                [image]="currentUser?.avatarUrl"
                size="normal"
                shape="circle"
                [style]="{'background-color': '#1976D2', 'color': '#ffffff'}">
              </p-avatar>
            </p-button>
            
            <p-menu 
              #userMenu
              [model]="userMenuItems"
              [popup]="true"
              appendTo="body">
            </p-menu>
          </div>
        </div>
      </div>
    </header>

    <!-- Page Content -->
    <main class="layout-content">
      <router-outlet></router-outlet>
    </main>

    <!-- Footer -->
    <footer class="layout-footer">
      <div class="footer-content">
        <div class="footer-left">
          <span>&copy; 2025 National University of Science and Technology</span>
          <span class="separator">|</span>
          <span>Academic Certificate Verification System v1.0.0</span>
        </div>
        <div class="footer-right">
          <a href="#" class="footer-link">Privacy Policy</a>
          <span class="separator">|</span>
          <a href="#" class="footer-link">Terms of Service</a>
          <span class="separator">|</span>
          <a href="#" class="footer-link">Support</a>
        </div>
      </div>
    </footer>
  </div>
</div>
